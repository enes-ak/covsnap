{% set name = "covsnap" %}
{% set version = "0.2.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/enes-ak/covsnap/archive/v{{ version }}.tar.gz
  sha256: PLACEHOLDER

build:
  number: 0
  noarch: python
  entry_points:
    - covsnap = covsnap.cli:main
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
    - setuptools-scm >=8
  run:
    - python >=3.9
    - pysam >=0.22
    - numpy >=1.24
    - samtools >=1.17
    - htslib >=1.17
    - tabix
  run_constrained:
    # mosdepth is optional but recommended; constrain version if present
    - mosdepth >=0.3.4

test:
  imports:
    - covsnap
    - covsnap.cli
    - covsnap.engines
    - covsnap.annotation
    - covsnap.html_report
  requires:
    - pytest
    - samtools
  source_files:
    - recipes/conda/test_generate_bam.py
    - recipes/conda/test_verify_html.py
  commands:
    - covsnap --version
    - python recipes/conda/test_generate_bam.py
    - covsnap test_sorted.bam BRCA1 -o test_report.html --engine samtools
    - test -f test_report.html
    - python recipes/conda/test_verify_html.py
    - covsnap test_sorted.bam chr17:43044295-43125482 -o test_region.html --engine samtools
    - test -f test_region.html
    - rm -f test_sorted.bam test_sorted.bam.bai test_report.html test_region.html

about:
  home: https://github.com/enes-ak/covsnap
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Coverage inspector for targeted sequencing QC (hg38)
  description: |
    covsnap computes per-target and per-exon depth metrics from
    BAM/CRAM files, producing an interactive HTML report with
    PASS/FAIL classifications and visual coverage summaries.
    Supports gene symbols, genomic regions, and BED files as input.
    Ships with a bundled GENCODE v44 hg38 gene index — no internet
    or GTF files required at runtime.
  dev_url: https://github.com/enes-ak/covsnap
  doc_url: https://github.com/enes-ak/covsnap/blob/main/README.md

extra:
  recipe-maintainers:
    - enes-ak
  identifiers:
    - biotools:covsnap
  additional-platforms:
    - linux-aarch64
    - osx-arm64
